{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto; text-align: center;">
    <h2>Confirmar Exclusão</h2>
    <p>Tem certeza de que deseja excluir o cadastro do aluno <strong>{{ object.user.get_full_name }}</strong>?</p>
    <p style="color: var(--alert-error); margin-bottom: 2rem;">Esta ação não pode ser desfeita e todos os treinos vinculados a este aluno serão perdidos.</p>
    
    <form method="post">
        {% csrf_token %}
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <button type="submit" class="btn-primary" style="background-color: var(--alert-error);">Sim, excluir</button>
            <a href="{% url 'management:dashboard' %}" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
